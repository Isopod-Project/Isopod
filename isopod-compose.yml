version: '3.8'

services:
  isopod:
    build: .
    image: isopod:latest
    container_name: isopod
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Critical: Host and internal path must match perfectly 
      # so that compose up commands resolve relative paths on the host daemon natively!
      - /DATA/AppData/isopod/servers:/DATA/AppData/isopod/servers
    environment:
      - SERVERS_DIR=/DATA/AppData/isopod/servers
