version: '3.8'

services:
  isopod-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: isopod:dev  # The name and tag for your local dev image
    container_name: isopod-dev
    restart: unless-stopped
    ports:
      - "8000:8000"  # This is the port for the Web UI
    volumes:
      # Mount the Docker socket so Isopod can manage other containers
      - /var/run/docker.sock:/var/run/docker.sock
      
      # MOUNT YOUR SOURCE CODE HERE
      # In CasaOS, change the left side to the absolute path of your repo on the host
      - .:/app
      
      # Persistent storage for the Minecraft servers
      - /DATA/AppData/isopod/servers:/DATA/AppData/isopod/servers
      
      # Cache volumes to keep restarts FAST (prevents re-downloading deps)
      - isopod-node-cache:/app/frontend/node_modules
      - isopod-pip-cache:/root/.cache/pip
      
    environment:
      - SERVERS_DIR=/DATA/AppData/isopod/servers
      - ENV=development
    
    # CasaOS UI Metadata
    labels:
      icon: "https://raw.githubusercontent.com/tacoz234/Isopod/main/dev_logo.png"
      title: "Isopod Dev"
      description: "Development build: Pull changes and click RESTART to update."
      casaos_app_id: "isopod-dev"

volumes:
  isopod-node-cache:
  isopod-pip-cache:
