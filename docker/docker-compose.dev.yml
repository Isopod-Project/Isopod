version: '3.8'

services:
  isopod-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    image: isopod:dev
    container_name: isopod-dev
    restart: unless-stopped
    ports:
      - "${DEV_PORT:-8001}:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      
      # Mount the source code (Defaults to current directory)
      - ${PROJECT_ROOT:-..}:/app
      
      # Mount the servers directory (Defaults to the common CasaOS path)
      - ${SERVERS_DIR:-/DATA/AppData/isopod/servers}:/DATA/AppData/isopod/servers
      
    environment:
      - SERVERS_DIR=${SERVERS_DIR:-/DATA/AppData/isopod/servers}
      - ENV=development
    
    labels:
      icon: "https://raw.githubusercontent.com/tacoz234/Isopod/main/assets/dev_logo.png"
      title: "Isopod Dev"
      description: "Development build: Restart to rebuild frontend and sync backend."
      casaos_app_id: "isopod-dev"

